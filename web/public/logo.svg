<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <!-- Clip path to keep clouds nicely contained inside the laptop screen -->
    <clipPath id="screenClip">
      <rect x="131" y="181" width="238" height="172" rx="8" />
    </clipPath>
    
    <!-- Clip path for the rocket body to perfectly align the nose cone and highlight -->
    <clipPath id="bodyClip">
      <ellipse cx="250" cy="165" rx="45" ry="95" />
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="500" height="500" fill="#F4F5F7" />

  <!-- ========================================== -->
  <!-- LAPTOP SCREEN (BACKGROUND LAYER)           -->
  <!-- ========================================== -->
  
  <!-- Screen Outer Bezel -->
  <rect x="115" y="165" width="270" height="210" rx="15" fill="#393D89" />
  
  <!-- Screen Inner Display -->
  <rect x="131" y="181" width="238" height="172" rx="8" fill="#FFFFFF" />
  
  <!-- Bezel Right Highlight -->
  <rect x="377" y="240" width="4" height="45" rx="2" fill="#FFFFFF" />

  <!-- ========================================== -->
  <!-- CLOUDS & EXHAUST (CLIPPED TO SCREEN)       -->
  <!-- ========================================== -->
  <g clip-path="url(#screenClip)">
    <!-- Central Exhaust Pillar -->
    <rect x="230" y="280" width="40" height="80" fill="#519FFD" />
    
    <!-- Clouds Solid Base -->
    <rect x="131" y="325" width="238" height="50" fill="#519FFD" />
    
    <!-- Fluffy Cloud Bumps -->
    <circle cx="150" cy="335" r="20" fill="#519FFD" />
    <circle cx="175" cy="325" r="25" fill="#519FFD" />
    <circle cx="205" cy="330" r="22" fill="#519FFD" />
    <circle cx="235" cy="315" r="28" fill="#519FFD" />
    <circle cx="250" cy="310" r="30" fill="#519FFD" />
    <circle cx="265" cy="315" r="28" fill="#519FFD" />
    <circle cx="295" cy="330" r="22" fill="#519FFD" />
    <circle cx="325" cy="325" r="25" fill="#519FFD" />
    <circle cx="350" cy="335" r="20" fill="#519FFD" />
  </g>

  <!-- ========================================== -->
  <!-- ROCKET EXHAUST FLAME                       -->
  <!-- ========================================== -->
  <!-- Outer Yellow Flame -->
  <path d="M 220 250 C 220 310 245 340 250 345 C 255 340 280 310 280 250 Z" fill="#F8D065" />
  
  <!-- Inner Orange Flame -->
  <path d="M 232 250 C 232 290 246 315 250 320 C 254 315 268 290 268 250 Z" fill="#E79C55" />

  <!-- ========================================== -->
  <!-- ROCKET FINS (BEHIND BODY)                  -->
  <!-- ========================================== -->
  <!-- Left Fin -->
  <path d="M 212 195 C 180 200 170 230 170 260 C 185 260 200 250 212 235 Z" 
        fill="#D8425C" stroke="#D8425C" stroke-width="4" stroke-linejoin="round" />
        
  <!-- Right Fin -->
  <path d="M 288 195 C 320 200 330 230 330 260 C 315 260 300 250 288 235 Z" 
        fill="#D8425C" stroke="#D8425C" stroke-width="4" stroke-linejoin="round" />

  <!-- ========================================== -->
  <!-- ROCKET MAIN BODY                           -->
  <!-- ========================================== -->
  <!-- Base Ellipse -->
  <ellipse cx="250" cy="165" rx="45" ry="95" fill="#EBECFA" />
  
  <!-- Left White Crescent Highlight -->
  <path d="M 250 70 A 45 95 0 0 0 250 260 A 35 95 0 0 1 250 70 Z" fill="#FFFFFF" />
  
  <!-- Red Nose Cone (Clipped to body) -->
  <rect x="200" y="70" width="100" height="50" fill="#D8425C" clip-path="url(#bodyClip)" />

  <!-- ========================================== -->
  <!-- ROCKET FOREGROUND DETAILS                  -->
  <!-- ========================================== -->
  <!-- Center Red Fin -->
  <rect x="242" y="200" width="16" height="70" rx="8" fill="#D8425C" />
  
  <!-- Window Outer Frame -->
  <circle cx="250" cy="175" r="25" fill="#23293D" />
  
  <!-- Window Inner Glass -->
  <circle cx="250" cy="175" r="16" fill="#519FFD" />

  <!-- ========================================== -->
  <!-- LAPTOP BASE (FOREGROUND LAYER)             -->
  <!-- ========================================== -->
  <!-- Base Front Edge & Bottom Curve -->
  <path d="M 85 395 L 415 395 A 20 20 0 0 1 395 415 L 105 415 A 20 20 0 0 1 85 395 Z" fill="#C3C7EF" />
  
  <!-- Base Top Surface (Keyboard Area) -->
  <path d="M 130 365 L 370 365 A 10 10 0 0 1 378 370 L 415 395 L 85 395 L 122 370 A 10 10 0 0 1 130 365 Z" fill="#E1E2F6" />
  
  <!-- Trackpad -->
  <rect x="225" y="375" width="50" height="8" rx="4" fill="#B9BEE5" />
  
  <!-- Base Front Left Highlight -->
  <rect x="110" y="402" width="70" height="5" rx="2.5" fill="#FFFFFF" />

</svg>
